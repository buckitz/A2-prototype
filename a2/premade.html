<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakecity | Pre-Made Cakes</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
  </head>
  <body data-page="premade">
    <header class="site-header">
      <div class="site-header-inner header-wireframe">
        <nav class="site-nav desktop-nav nav-left">
          <a href="custom.html">Custom</a>
          <a href="premade.html">Pre-Made</a>
        </nav>
        <a class="brand-mark brand-center" href="index.html">
          <span class="brand-name">Bakecity</span>
        </a>
        <nav class="site-nav desktop-nav nav-right">
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
          <a href="login.html" class="nav-login">Login</a>
        </nav>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="mobile-nav">
          <span></span>
          <span></span>
        </button>
      </div>
      <nav class="site-nav site-nav-mobile" id="mobile-nav">
        <a href="custom.html">Custom</a>
        <a href="premade.html">Pre-Made</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="login.html" class="nav-login">Login</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="page-hero page-hero-wireframe">
        <div class="page-hero-copy">
          <span class="section-chip">Pre-made catalog</span>
          <h1>Pre-made cakes and pastries</h1>
          <p>Browse an array of cakes and pastries, then filter by bakery and pastry type the same way customers would on a real marketplace.</p>
        </div>
      </section>

      <section class="page-panel catalog-shell">
        <div class="catalog-toolbar">
          <div class="field">
            <label for="catalog-bakery-filter">Bakery</label>
            <select id="catalog-bakery-filter"></select>
          </div>
          <div class="field">
            <label for="catalog-type-filter">Pastry type</label>
            <select id="catalog-type-filter"></select>
          </div>
          <div class="field">
            <label for="catalog-sort-filter">Sort</label>
            <select id="catalog-sort-filter">
              <option value="name">Name</option>
              <option value="price-low">Price: low to high</option>
              <option value="price-high">Price: high to low</option>
            </select>
          </div>
        </div>
        <div class="product-grid" id="catalog-grid"></div>
      </section>

    </main>

    <footer class="site-footer" data-site-footer></footer>
  </body>
</html>
